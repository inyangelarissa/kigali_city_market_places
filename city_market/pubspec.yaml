name: city_market
description: Kigali City Services & Places Directory
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

  # State Management
  provider: ^6.1.1

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  url_launcher: ^6.2.2

  # UI
  cupertino_icons: ^1.0.2
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  uuid: ^4.2.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true